<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>🍳 Kitchen Display</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07090f;
      --surface: #0e1118;
      --surface2: #13171f;
      --grad: linear-gradient(135deg, #3b82f6, #6366f1);
      --grad-green: linear-gradient(135deg, #22c55e, #16a34a);
      --border-pending: #3b82f6;
      --border-focus: #fff;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --card-h: 250px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .kds-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid #1e2535;
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.5);
    }

    .kds-title {
      font-size: 1.25rem;
      font-weight: 700;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
    }

    .kds-clock {
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .spacer { flex: 1; }

    .badge {
      background: var(--grad);
      color: #fff;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
      min-width: 28px;
      text-align: center;
    }

    .btn-toggle {
      background: var(--surface2);
      border: 1px solid #2a3347;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-toggle:hover { background: #1e2535; border-color: var(--border-pending); }
    .btn-toggle.active { background: var(--grad); border-color: transparent; color: #fff; }

    /* ── MAIN ── */
    .kds-main {
      padding: 20px;
      min-height: calc(100vh - 60px - 40px);
    }

    /* ── GRID ── */
    .orders-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (min-width: 1024px) {
      .orders-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 480px) {
      .orders-grid { grid-template-columns: 1fr; }
    }

    /* ── CARD ── */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .order-card {
      background: var(--surface);
      border: 2px solid var(--border-pending);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: var(--card-h);
      box-shadow: 0 0 18px rgba(59,130,246,0.18), 0 2px 8px rgba(0,0,0,0.4);
      position: relative;
      animation: slideUp 0.35s ease both;
      cursor: pointer;
      outline: none;
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .order-card:focus,
    .order-card.focused {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.35), 0 0 28px rgba(59,130,246,0.4);
    }

    .order-card.completed-card {
      border-color: #2a3347;
      box-shadow: none;
      opacity: 0.72;
    }

    /* Top bar */
    .card-top {
      background: var(--grad);
      padding: 10px 12px 8px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .card-label {
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1;
      color: #fff;
    }
    .card-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }
    .card-table {
      font-size: 0.72rem;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .card-customer {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.7);
      max-width: 80px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-time {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.65);
    }

    /* NEW badge */
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.65; transform: scale(0.92); }
    }
    .new-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #ef4444;
      color: #fff;
      font-size: 0.6rem;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 5px;
      letter-spacing: 0.08em;
      animation: pulse 1.2s ease-in-out infinite;
      z-index: 2;
    }

    /* Items */
    .card-items {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px 4px;
      scrollbar-width: thin;
      scrollbar-color: #2a3347 transparent;
    }
    .card-items::-webkit-scrollbar { width: 4px; }
    .card-items::-webkit-scrollbar-thumb { background: #2a3347; border-radius: 2px; }

    .item-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 2px 0;
    }
    .item-name {
      flex: 1;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-qty {
      font-size: 3.5rem;
      font-weight: 800;
      line-height: 1;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      flex-shrink: 0;
      min-width: 2ch;
      text-align: right;
    }

    /* single-item big display */
    .single-item-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px 10px;
      overflow: hidden;
    }
    .single-item-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      text-align: center;
      margin-bottom: 2px;
    }
    .single-item-qty {
      font-size: 4rem;
      font-weight: 900;
      line-height: 1;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    /* Done button */
    .card-footer {
      padding: 8px 10px;
      flex-shrink: 0;
    }
    .btn-done {
      width: 100%;
      background: var(--grad-green);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 7px 0;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.15s;
    }
    .btn-done:hover { opacity: 0.88; }
    .btn-done:active { opacity: 0.75; }

    /* Completed overlay icon */
    .completed-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .completed-overlay span {
      font-size: 3.5rem;
      opacity: 0.18;
    }
    .card-completed-at {
      font-size: 0.68rem;
      color: var(--muted);
      text-align: center;
      padding: 0 10px 8px;
    }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .emoji { font-size: 3rem; display: block; margin-bottom: 12px; }
    .empty-state p { font-size: 1.1rem; font-weight: 600; }

    /* ── KEYBOARD HINT ── */
    .kds-footer {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      color: #3d4a5c;
      letter-spacing: 0.04em;
      gap: 6px;
    }
    .kds-footer kbd {
      background: #1a2133;
      border: 1px solid #2a3347;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.68rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="kds-header">
    <span class="kds-title">🍳 Kitchen Display</span>
    <span class="kds-clock" id="clock">--:--:--</span>
    <span class="spacer"></span>
    <span class="badge" id="pendingBadge">0</span>
    <button class="btn-toggle" id="toggleBtn" onclick="toggleView()">✅ Completed</button>
  </header>

  <!-- MAIN -->
  <main class="kds-main">
    <!-- Pending view -->
    <div id="pendingView">
      <div class="orders-grid" id="pendingGrid">
        <div class="empty-state">
          <span class="emoji">🎉</span>
          <p>No pending orders</p>
        </div>
      </div>
    </div>

    <!-- Completed view (hidden initially) -->
    <div id="completedView" style="display:none">
      <div style="margin-bottom:16px;">
        <button class="btn-toggle" onclick="toggleView()" style="padding:8px 18px;">← Back to Pending</button>
      </div>
      <div class="orders-grid" id="completedGrid">
        <div class="empty-state">
          <span class="emoji">📭</span>
          <p>No completed orders yet</p>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="kds-footer">
    <kbd>←</kbd><kbd>→</kbd> navigate &nbsp;•&nbsp; <kbd>Space</kbd> = done
  </footer>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script>
    // ── Firebase init ──
    firebase.initializeApp({
      apiKey:            "AIzaSyBZCm8Fmp-zNlb2D20gqLCyifky-hGtZvI",
      authDomain:        "newpos-dacb5.firebaseapp.com",
      databaseURL:       "https://newpos-dacb5-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "newpos-dacb5",
      storageBucket:     "newpos-dacb5.appspot.com",
      messagingSenderId: "667100253940",
      appId:             "1:667100253940:web:cfd8f0b9b51b6e697818a1"
    });

    const db = firebase.database();

    // ── State ──
    let allOrders   = [];   // sorted pending
    let doneOrders  = [];   // sorted completed
    let focusIndex  = 0;    // index in allOrders for keyboard nav
    let showingDone = false;

    // ── Clock ──
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('en-GB', { hour12: false });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── Firebase listener ──
    db.ref('orders').on('value', snap => {
      const val = snap.val();
      const pending   = [];
      const completed = [];

      if (val) {
        Object.values(val).forEach(o => {
          if (o.status === 'completed') completed.push(o);
          else                          pending.push(o);
        });
        pending.sort((a, b)   => (a.orderNumber || 0) - (b.orderNumber || 0));
        completed.sort((a, b) => (a.orderNumber || 0) - (b.orderNumber || 0));
      }

      allOrders  = pending;
      doneOrders = completed;

      document.getElementById('pendingBadge').textContent = pending.length;
      renderPending();
      renderCompleted();
    });

    // ── Helpers ──
    function fmtTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    function isNew(ts) {
      if (!ts) return false;
      return (Date.now() - new Date(ts).getTime()) < 2 * 60 * 1000;
    }

    function tableLabel(order) {
      if (!order.type || order.type === 'dinein') {
        return order.table ? 'Table ' + order.table : 'Dine-in';
      }
      return 'Takeaway';
    }

    // ── Mark done ──
    function markDone(orderNumber) {
      if (orderNumber === null || orderNumber === undefined) return;
      db.ref('orders/' + orderNumber).update({
        status:      'completed',
        completedAt: new Date().toISOString()
      });
    }

    // ── Card builder ──
    function buildCard(order, isCompleted) {
      const card = document.createElement('div');
      card.className = 'order-card' + (isCompleted ? ' completed-card' : '');
      card.setAttribute('tabindex', '-1');
      card.dataset.orderNumber = order.orderNumber;

      const items = Array.isArray(order.items) ? order.items : [];
      const isSingle = items.length === 1;

      // NEW badge
      if (!isCompleted && isNew(order.timestamp)) {
        const nb = document.createElement('div');
        nb.className = 'new-badge';
        nb.textContent = 'NEW';
        card.appendChild(nb);
      }

      // Top bar
      const top = document.createElement('div');
      top.className = 'card-top';

      const label = document.createElement('div');
      label.className = 'card-label';
      label.textContent = order.orderLabel || ('#' + String(order.orderNumber).padStart(3, '0'));

      const meta = document.createElement('div');
      meta.className = 'card-meta';

      const tableEl = document.createElement('div');
      tableEl.className = 'card-table';
      tableEl.textContent = tableLabel(order);

      const custEl = document.createElement('div');
      custEl.className = 'card-customer';
      custEl.textContent = order.customer || '';

      const timeEl = document.createElement('div');
      timeEl.className = 'card-time';
      timeEl.textContent = fmtTime(order.timestamp);

      meta.appendChild(tableEl);
      if (order.customer) meta.appendChild(custEl);
      meta.appendChild(timeEl);

      top.appendChild(label);
      top.appendChild(meta);
      card.appendChild(top);

      // Items
      if (isSingle) {
        const wrap = document.createElement('div');
        wrap.className = 'single-item-wrap';

        const name = document.createElement('div');
        name.className = 'single-item-name';
        name.textContent = items[0].name;

        const qty = document.createElement('div');
        qty.className = 'single-item-qty';
        qty.textContent = items[0].qty;

        wrap.appendChild(name);
        wrap.appendChild(qty);
        card.appendChild(wrap);
      } else {
        const list = document.createElement('div');
        list.className = 'card-items';

        items.forEach(it => {
          const row = document.createElement('div');
          row.className = 'item-row';

          const nm = document.createElement('div');
          nm.className = 'item-name';
          nm.textContent = it.name;

          const q = document.createElement('div');
          q.className = 'item-qty';
          q.textContent = it.qty;

          row.appendChild(nm);
          row.appendChild(q);
          list.appendChild(row);
        });

        card.appendChild(list);
      }

      // Completed overlay
      if (isCompleted) {
        const ov = document.createElement('div');
        ov.className = 'completed-overlay';
        const ic = document.createElement('span');
        ic.textContent = '✅';
        ov.appendChild(ic);
        card.appendChild(ov);

        const cat = document.createElement('div');
        cat.className = 'card-completed-at';
        cat.textContent = order.completedAt ? ('Done at ' + fmtTime(order.completedAt)) : '';
        card.appendChild(cat);
      }

      // Footer (only for pending)
      if (!isCompleted) {
        const footer = document.createElement('div');
        footer.className = 'card-footer';

        const btn = document.createElement('button');
        btn.className = 'btn-done';
        btn.textContent = '✓ Done';
        btn.addEventListener('click', e => {
          e.stopPropagation();
          markDone(order.orderNumber);
        });

        footer.appendChild(btn);
        card.appendChild(footer);
      }

      return card;
    }

    // ── Render pending ──
    function renderPending() {
      const grid = document.getElementById('pendingGrid');
      grid.innerHTML = '';

      if (allOrders.length === 0) {
        grid.innerHTML = '<div class="empty-state"><span class="emoji">🎉</span><p>No pending orders</p></div>';
        focusIndex = 0;
        return;
      }

      allOrders.forEach((order, i) => {
        const card = buildCard(order, false);
        if (i === focusIndex) card.classList.add('focused');
        grid.appendChild(card);
      });

      applyFocus();
    }

    // ── Render completed ──
    function renderCompleted() {
      const grid = document.getElementById('completedGrid');
      grid.innerHTML = '';

      if (doneOrders.length === 0) {
        grid.innerHTML = '<div class="empty-state"><span class="emoji">📭</span><p>No completed orders yet</p></div>';
        return;
      }

      doneOrders.forEach(order => {
        grid.appendChild(buildCard(order, true));
      });
    }

    // ── Focus management ──
    function applyFocus() {
      const cards = document.querySelectorAll('#pendingGrid .order-card');
      cards.forEach((c, i) => {
        c.classList.toggle('focused', i === focusIndex);
      });
      if (cards[focusIndex]) {
        cards[focusIndex].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    }

    // ── Toggle view ──
    function toggleView() {
      showingDone = !showingDone;
      document.getElementById('pendingView').style.display   = showingDone ? 'none' : '';
      document.getElementById('completedView').style.display = showingDone ? ''     : 'none';
      const btn = document.getElementById('toggleBtn');
      btn.textContent = showingDone ? '🕐 Pending' : '✅ Completed';
      btn.classList.toggle('active', showingDone);
    }

    // ── Keyboard navigation ──
    document.addEventListener('keydown', e => {
      if (showingDone) return;
      if (allOrders.length === 0) return;

      if (e.key === 'ArrowRight') {
        e.preventDefault();
        focusIndex = Math.min(focusIndex + 1, allOrders.length - 1);
        applyFocus();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        focusIndex = Math.max(focusIndex - 1, 0);
        applyFocus();
      } else if (e.key === ' ') {
        e.preventDefault();
        if (allOrders[focusIndex]) {
          markDone(allOrders[focusIndex].orderNumber);
          focusIndex = Math.max(0, Math.min(focusIndex, allOrders.length - 2));
        }
      }
    });
  </script>
</body>
</html>
